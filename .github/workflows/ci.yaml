name: CI-Pipeline

on: push

jobs:
  project-Building:

    runs-on: ubuntu-latest

    steps:
      - name: chekout code
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('stopwords')"
          python -c "import nltk; nltk.download('wordnet')"

      - name: run pipeline
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: |
          dvc repro

      - name: Run model tests
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: |
          python -m unittest tests/test_model.py
          
      - name: promote model to production
        if: success()
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: |
          python scripts/promot_model.py

      - name: Test flask app
        if: success()
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: |
          python -m unittest tests/test_flask_app.py
      
      - name: Login ECR
        if: success()
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_KEY }}
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 065882629527.dkr.ecr.eu-north-1.amazonaws.com
        
      - name: Build Docker image
        if: success()
        run: |
          docker build -t  emotioc_ecr .
        
      - name: Tag Docker image
        run: |
          docker tag emotioc_ecr:latest 065882629527.dkr.ecr.eu-north-1.amazonaws.com/emotioc_ecr:latest1
        
      - name: Push Docker image to ECR
        run: |
          docker push 065882629527.dkr.ecr.eu-north-1.amazonaws.com/emotioc_ecr:latest1

      - name: Deploy to EC2
        if: success()
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_KEY }}
            aws configure set aws_region eu-north-1
            aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 065882629527.dkr.ecr.eu-north-1.amazonaws.com
        
            docker pull 065882629527.dkr.ecr.eu-north-1.amazonaws.com/emotioc_ecr:latest1
            docker stop emotioc_app || true
            docker rm emotioc_app || true
            docker run -d -p 8000:5000 -e DAGSHUB_PAT=${{ secrets.DAGSHUB_PAT }} --name emotioc_app 065882629527.dkr.ecr.eu-north-1.amazonaws.com/emotioc_ecr:latest1